{% extends 'base.html' %}
{% block content %}
<div class="grid two">
    <section class="card">
        <h2>Book an Appointment</h2>
        <form method="post" class="form-grid">
            <label>Date
                <input type="date" name="appointment_date" required>
            </label>
            <label>Time
                <input type="time" name="appointment_time" required>
            </label>
            <label class="full">Purpose
                <textarea name="purpose" rows="4" required placeholder="Explain your appointment purpose."></textarea>
            </label>
            <button type="submit">Submit Request</button>
        </form>
    </section>
    <section class="card">
        <h2>My Requests</h2>
        <table>
            <tr><th>Date</th><th>Time</th><th>Status</th><th>Staff Note</th></tr>
            {% for appointment in appointments %}
            <tr>
                <td>{{ appointment.appointment_date }}</td>
                <td>{{ appointment.appointment_time }}</td>
                <td>{{ appointment.status }}</td>
                <td>{{ appointment.staff_note }}</td>
            </tr>
            {% endfor %}
        </table>
    </section>
</div>
{% endblock %}
