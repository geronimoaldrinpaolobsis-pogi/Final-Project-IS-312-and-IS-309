{% extends 'base.html' %}
{% block content %}
<div class="card narrow">
    <h2>Login</h2>
    <form method="post" class="form-grid">
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Sign In</button>
    </form>
    <div class="info-box">
    </div>
</div>
{% endblock %}
